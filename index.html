<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f1ea;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      color:#111;
    }

    .card{
      background:white;
      width:320px;
      padding:30px;
      border-radius:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1{
      font-size:22px;
      margin-bottom:20px;
    }

    .bank{
      border:1px solid #ddd;
      padding:14px;
      border-radius:14px;
      margin-bottom:12px;
      cursor:pointer;
    }

    .bank:hover{
      background:#f8f8f8;
    }

    .details{
      margin-top:30px;
      display:none;
    }

    .number{
      font-size:32px;
      font-weight:bold;
      margin:20px 0;
      letter-spacing:2px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:black;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:15px;
    }

    .small{
      color:#666;
      margin-top:8px;
      font-size:14px;
    }

  </style>
</head>
<body>

  <div class="card">

    <h1>¿Cómo deseas pagar?</h1>

    <div class="bank" onclick="showBank('Pichincha','2200 456 789')">
      Banco Pichincha
    </div>

    <div class="bank" onclick="showBank('Guayaquil','0987 654 321')">
      Banco Guayaquil
    </div>

    <div class="bank" onclick="showBank('Produbanco','1234 567 890')">
      Produbanco
    </div>

    <div class="details" id="details">

      <div class="small" id="bankName"></div>

      <div class="number" id="accountNumber"></div>

      <div>
        Ronald Guzmán Dávila
      </div>

      <div class="small">
        Cuenta Corriente
      </div>

      <button onclick="copyNumber()">
        Copiar número
      </button>

    </div>

  </div>

  <script>

    let currentNumber = "";

    function showBank(bank, number){
      document.getElementById("details").style.display = "block";
      document.getElementById("bankName").innerText = bank;
      document.getElementById("accountNumber").innerText = number;

      currentNumber = number;
    }

    function copyNumber(){
      navigator.clipboard.writeText(currentNumber);
      alert("Número copiado");
    }

  </script>

</body>
</html>
